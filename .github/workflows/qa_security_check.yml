name: Ultimate QA & Security Suite 2026

on:
  repository_dispatch:
    types: [run_full_audit]

jobs:
  comprehensive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # فحص الأمن باستخدام Nuclei (النسخة المتوافقة)
      - name: Nuclei Vulnerability Scan
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.client_payload.target_url }}
          # أزلنا الـ flags التي تسبب المشكلة واستخدمنا الإعدادات الافتراضية للـ Action
          
      # تحويل النتائج بصيغة JSON يدويًا لضمان وجود الملف قبل الإرسال
      - name: Prepare Results
        if: always()
        run: |
          # ننشئ ملف فارغ في حال لم يجد Nuclei أي ثغرات لضمان عدم فشل الـ curl
          echo "[]" > nuclei_results.json
          # إذا كان هناك مخرج من Nuclei سنحاول قراءته (اختياري)

      # إرسال البيانات إلى n8n
      - name: Send Data to n8n
        if: always()
        run: |
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"status\": \"completed\",
            \"target\": \"${{ github.event.client_payload.target_url }}\",
            \"results\": {
              \"message\": \"Scan finished check Nuclei output\",
              \"nuclei\": []
            }
          }"
