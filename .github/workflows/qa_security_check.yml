name: Ultimate QA & Security Suite 2026

on:
  repository_dispatch:
    types: [run_full_audit]

jobs:
  comprehensive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 1. اختبارات الوحدة (Vitest)
      - name: Run Vitest
        run: |
          npm install
          npx vitest run --reporter=json > vitest_results.json || true

      # 2. اختبارات الواجهة (Playwright) + Percy
      - name: Run Playwright & Percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          npx playwright install --with-deps
          npx percy exec -- npx playwright test --reporter=json > playwright_results.json || true

      # 3. اختبارات الأداء (k6)
      - name: Run k6 Load Test
        run: |
          docker run --rm -i grafana/k6 run - <tests/performance.js --out json=k6_results.json || true

      # 4. الأمن (OWASP ZAP)
      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ github.event.client_payload.target_url }}
          artifact_name: 'zap_report'

      # 5. الأمن (Nuclei)
      - name: Nuclei Vulnerability Scan
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.client_payload.target_url }}
          json: true
          output: nuclei_results.json

      # 6. جمع النتائج وتوليد تقرير Allure
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages

      # 7. إرسال النتائج النهائية (مع البيانات الفعلية) إلى n8n
      - name: Send Data to n8n
        if: always()
        run: |
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"status\": \"completed\",
            \"target\": \"${{ github.event.client_payload.target_url }}\",
            \"allure_report_url\": \"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}\",
            \"results\": {
              \"vitest\": $(cat vitest_results.json || echo \"[]\"),
              \"playwright\": $(cat playwright_results.json || echo \"[]\"),
              \"nuclei\": $(cat nuclei_results.json | jq -s '.' || echo \"[]\")
            }
          }"
