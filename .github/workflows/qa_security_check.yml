name: Ultimate QA & Security Suite 2026

on:
  repository_dispatch:
    types: [run_full_audit]

jobs:
  comprehensive-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # فحص الأمن باستخدام Nuclei (هذا لا يحتاج لملفات في المستودع)
      - name: Nuclei Vulnerability Scan
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.client_payload.target_url }}
          json: true
          output: nuclei_results.json

      # إرسال البيانات فوراً لـ n8n
      - name: Send Data to n8n
        if: always()
        run: |
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"status\": \"completed\",
            \"target\": \"${{ github.event.client_payload.target_url }}\",
            \"results\": {
              \"nuclei\": $(cat nuclei_results.json | jq -s '.' || echo \"[]\")
            }
          }"
